<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" routerLink="/">🎬 CineExplorer</a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" routerLink="/"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }">
            Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/favorites"
             routerLinkActive="active">
            Favoritos
            @if (cantidadFavoritas > 0) {
              <span class="badge bg-danger ms-1">{{ cantidadFavoritas }}</span>
            }
          </a>
        </li>
      </ul>

      <form class="d-flex ms-auto" role="search">
        <input
          [formControl]="searchControl"
          class="form-control me-2"
          type="search"
          placeholder="Buscar películas..."
          aria-label="Buscar">
      </form>

      <button (click)="toggleTema()" class="btn btn-outline-light btn-sm ms-2">
        {{ temaActual === 'light' ? '🌙' : '☀️' }}
      </button>
    </div>
  </div>
</nav>
